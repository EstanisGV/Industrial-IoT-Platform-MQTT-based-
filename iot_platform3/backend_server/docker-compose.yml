version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  mqtt-debug:
    image: eclipse-mosquitto:2
    container_name: mqtt-debug
    depends_on:
      - mosquitto
    command: >
      sh -c "sleep 3 &&
      mosquitto_sub
      -h mosquitto
      -p 1883
      -u mqtt-debug
      -P debugpass
      -t 'factory/#'
      -v"
