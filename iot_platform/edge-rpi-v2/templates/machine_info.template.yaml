machine:
  machine_id: "{{ machine_id }}"
  plant: "{{ plant }}"
  area: "{{ area }}"
  line: "{{ line }}"
  controller: "{{ controller }}"
  config_version: "1.0.0"
  topics:
    telemetry: "factory/{{ plant }}/{{ machine_id }}/telemetry"
    heartbeat: "factory/{{ plant }}/{{ machine_id }}/heartbeat"
    status: "factory/{{ plant }}/{{ machine_id }}/status"
